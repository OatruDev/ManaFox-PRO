<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>MTG Assigner: Zorro Corp v3.0.1-beta</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { 
                extend: { 
                    colors: { 
                        "app-bg": "#120919", 
                        "app-surface": "#1d1425", 
                        "app-surface-light": "#271b31", 
                        "app-primary": "#7522f6", 
                        "app-accent": "#a855f7" 
                    },
                    fontFamily: { 
                        "sans": ["Inter", "sans-serif"] 
                    } 
                } 
            }
        }
    </script>

    <style>
        body { 
            background-color: #120919; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Control de Pantallas */
        .screen { display: none; opacity: 0; transition: opacity 0.3s ease; } 
        .screen.active { display: block; opacity: 1; }
        
        /* Utilidades */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Botones de Maná */
        .mana-btn { transition: all 0.2s; background-color: #271b31; border: 2px solid transparent; }
        .mana-btn.active { border-color: #ffffff; transform: scale(1.05); }
        .mana-w.active { background-color: #fef08a; color: #854d0e; }
        .mana-u.active { background-color: #3b82f6; color: #ffffff; }
        .mana-b.active { background-color: #1e293b; color: #94a3b8; border-color: #64748b; }
        .mana-r.active { background-color: #ef4444; color: #ffffff; }
        .mana-g.active { background-color: #22c55e; color: #ffffff; }
    </style>
</head>

<body class="min-h-screen flex flex-col pb-24">

    <header class="flex-none px-4 pt-10 pb-4 flex items-center justify-between sticky top-0 bg-app-bg/95 backdrop-blur-md z-50">
        <button onclick="goBack()" class="size-10 flex items-center justify-center rounded-full hover:bg-white/10 text-slate-300">
            <span class="material-symbols-outlined">arrow_back</span>
        </button>
        <div class="flex flex-col items-center">
            <h1 id="top-title" class="text-lg font-bold tracking-tight">Configure Match</h1>
            <span id="room-badge" onclick="copyRoomLink()" class="text-[10px] bg-app-primary/20 text-app-primary px-3 py-0.5 mt-1 rounded-full font-bold cursor-pointer hover:bg-app-primary/40 transition flex items-center gap-1">
                <span class="material-symbols-outlined text-[10px]">link</span> 
                <span id="room-id-text">...</span>
            </span>
        </div>
        <button onclick="showCredits()" class="size-10 flex items-center justify-center rounded-full bg-white/5 text-slate-400 hover:bg-white/10">
            <span class="material-symbols-outlined text-[20px]">help</span>
        </button>
    </header>

    <main id="screen-1" class="screen active px-4 mt-2">
        <div class="text-center mb-6">
            <h2 class="text-4xl font-extrabold">Battle Setup</h2>
        </div>

        <div class="mb-6">
            <h3 class="text-[11px] font-bold text-app-accent tracking-widest uppercase mb-3 px-1">Saved Presets</h3>
            <div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
                <div onclick="applyDandLPreset()" class="shrink-0 w-40 bg-app-surface border border-app-primary rounded-2xl p-4 cursor-pointer relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-1 bg-app-primary text-[8px] font-bold">TOP</div>
                    <div class="size-8 bg-app-primary/20 rounded-lg flex items-center justify-center mb-3 text-app-accent font-bold">D&L</div>
                    <p class="font-bold text-sm">D&L Match</p>
                    <p class="text-[10px] text-slate-400 mt-1">Daniel & Laura • 7 Decks</p>
                </div>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <div class="bg-app-surface p-5 rounded-2xl border border-white/5 flex justify-between items-center shadow-lg">
                <div class="flex flex-col">
                    <span class="text-app-accent font-bold text-[10px] uppercase">Players</span>
                    <span id="count-players" class="text-4xl font-black">2</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="updateCount('players', -1)" class="size-12 rounded-xl bg-app-surface-light flex items-center justify-center text-xl">-</button>
                    <button onclick="updateCount('players', 1)" class="size-12 rounded-xl bg-app-surface-light flex items-center justify-center text-xl">+</button>
                </div>
            </div>
            <div class="bg-app-surface p-5 rounded-2xl border border-white/5 flex justify-between items-center shadow-lg">
                <div class="flex flex-col">
                    <span class="text-app-accent font-bold text-[10px] uppercase">Library</span>
                    <span id="count-decks" class="text-4xl font-black">7</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="updateCount('decks', -1)" class="size-12 rounded-xl bg-app-surface-light flex items-center justify-center text-xl">-</button>
                    <button onclick="updateCount('decks', 1)" class="size-12 rounded-xl bg-app-surface-light flex items-center justify-center text-xl">+</button>
                </div>
            </div>
        </div>

        <div id="history-section" class="hidden">
            <h3 class="text-[11px] font-bold text-slate-500 tracking-widest uppercase mb-3 px-1">Recent Battles</h3>
            <div id="history-container" class="space-y-3"></div>
        </div>
    </main>

    <main id="screen-2" class="screen px-4 mt-2">
        <h2 class="text-3xl font-extrabold mb-6">Deck Entry</h2>
        <div id="deck-inputs-container" class="space-y-4"></div>
        <button onclick="addExtraDeck()" class="w-full mt-4 py-4 rounded-xl border-2 border-dashed border-app-primary/50 text-app-primary font-bold flex items-center justify-center gap-2 hover:bg-app-primary/10 transition">
            <span class="material-symbols-outlined">add</span> Add Deck
        </button>
    </main>

    <main id="screen-3" class="screen px-4 mt-2">
        <h2 class="text-3xl font-extrabold mb-6">Who is playing?</h2>
        <div id="saved-players-section" class="mb-6 hidden">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-3">Roster</p>
            <div id="saved-players-container" class="flex gap-4 overflow-x-auto pb-2 no-scrollbar"></div>
        </div>
        <div id="player-inputs-container" class="space-y-4"></div>
        <button onclick="addExtraPlayer()" class="w-full mt-6 py-4 rounded-xl border-2 border-dashed border-app-primary/50 text-app-primary font-bold flex items-center justify-center gap-2 transition">
            <span class="material-symbols-outlined">add</span> Add Player
        </button>
    </main>

    <main id="screen-4" class="screen px-4 mt-2">
        <div id="assignments-container" class="space-y-4 mb-8"></div>
        <div id="rem-section" class="hidden mb-10">
            <h4 class="text-[11px] uppercase font-bold text-slate-500 mb-4 px-1">Remaining Decks</h4>
            <div id="remaining-container" class="grid grid-cols-2 gap-3"></div>
        </div>
        <div class="space-y-3 pb-6">
            <button onclick="shareWhatsApp()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg transition">
                <span class="material-symbols-outlined">share</span> WhatsApp Results
            </button>
            <button onclick="reassignDecks()" class="w-full bg-app-primary py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-transform active:scale-95">
                <span class="material-symbols-outlined">shuffle</span> Reassign Pairings
            </button>
            <button onclick="startOver()" class="w-full bg-app-surface border border-white/5 text-slate-300 font-semibold py-4 rounded-xl flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">restart_alt</span> Start Over
            </button>
        </div>
    </main>

    <div id="main-action-bar" class="fixed bottom-0 left-0 w-full p-4 bg-app-bg/95 backdrop-blur-md z-40 border-t border-white/5">
        <button id="main-btn" onclick="handleNextStep()" class="w-full max-w-md mx-auto bg-app-primary text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-transform active:scale-95">
            Next Step <span class="material-symbols-outlined">chevron_right</span>
        </button>
    </div>


    <script>
        // --- 1. CONFIGURACIÓN Y CONSTANTES ---
        const baseDecks = [
            { name: "Jeskai Striker (Shiko)", colors: ['W', 'R', 'U'] },
            { name: "Endless Punishment (Valgavoth)", colors: ['B', 'R'] },
            { name: "Eldrazi Incursion (Ulalek)", colors: ['W', 'U', 'B', 'R', 'G'] },
            { name: "Dance of Elements (Ashling)", colors: ['W', 'U', 'B', 'R', 'G'] },
            { name: "Evangelion (Eva01)", colors: ['W', 'U'] },
            { name: "Death Toll (Winter)", colors: ['B', 'G'] },
            { name: "Sultai Arisen (Teval)", colors: ['B', 'G', 'U'] }
        ];

        const archetypes = { 
            'WU':'Azorius', 'UB':'Dimir', 'BR':'Rakdos', 'RG':'Gruul', 'WG':'Selesnya', 
            'WB':'Orzhov', 'UR':'Izzet', 'BG':'Golgari', 'WR':'Boros', 'UG':'Simic', 
            'WUG':'Bant', 'WUB':'Esper', 'UBR':'Grixis', 'BRG':'Jund', 'WRG':'Naya', 
            'WBG':'Abzan', 'WUR':'Jeskai', 'WBR':'Mardu', 'BUG':'Sultai', 'RUG':'Temur', 
            'WUBRG':'WUBRG (5-Color)' 
        };

        // --- 2. ESTADO GLOBAL DE LA APLICACIÓN ---
        let state = { 
            step: 1, 
            players: 2, 
            decks: 7, 
            deckData: [], 
            playerNames: [], 
            savedPlayers: [], 
            savedDecks: [], 
            history: [], 
            manaColors: [
                {id: 'W', cls: 'mana-w', icon: 'light_mode'},
                {id: 'U', cls: 'mana-u', icon: 'water_drop'},
                {id: 'B', cls: 'mana-b', icon: 'skull'},
                {id: 'R', cls: 'mana-r', icon: 'local_fire_department'},
                {id: 'G', cls: 'mana-g', icon: 'forest'}
            ] 
        };


        // --- 3. GUNDB: INICIALIZACIÓN DE LA NUBE ---
        let roomId = window.location.hash.substring(1);
        if (!roomId) {
            // Si no hay ID en la URL, generamos uno aleatorio y lo asignamos
            roomId = 'Zorro-' + Math.floor(Math.random() * 100000);
            window.location.hash = roomId;
        }
        document.getElementById('room-id-text').innerText = '#' + roomId;

        // Conectar con el servidor Gun (público)
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        window.cloudRoom = gun.get('mtg-zorro-corp-v3').get(roomId);

        // Escuchar cambios en la nube en tiempo real
        window.cloudRoom.get('sharedData').on((data) => {
            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    state.savedPlayers = parsed.p || [];
                    state.savedDecks = parsed.d || [];
                    state.history = parsed.h || [];
                    
                    // Actualizar las vistas correspondientes si estamos en ellas
                    renderHistory();
                    if (state.step === 3) renderSavedPlayers();
                } catch(e) {
                    console.error("Error al sincronizar datos:", e);
                }
            }
        });

        // Función unificada para guardar local y en la nube
        function saveData() {
            window.cloudRoom.get('sharedData').put(JSON.stringify({
                p: state.savedPlayers, 
                d: state.savedDecks, 
                h: state.history
            }));
        }


        // --- 4. UTILIDADES GENERALES ---
        function showCredits() {
            alert("⚔️ MTG Assigner: Zorro Corp\n" +
                  "Versión: v3.0.1-beta\n" +
                  "Desarrollado por: Oatru Dev\n\n" +
                  "Estado: Entorno de Pruebas (Beta)\n" +
                  "Sincronización: Activa vía GunDB");
        }

        function copyRoomLink() {
            navigator.clipboard.writeText(window.location.href);
            alert('¡Enlace de sesión copiado!\nÚsalo en otros dispositivos para sincronizar todo en tiempo real.');
        }

        function getColorName(colors) { 
            if (colors.length < 2) return ""; 
            
            // Ordenamos los colores alfabéticamente para hacer match con el diccionario
            const key = [...colors].sort().join(''); 
            
            const sortedArch = Object.keys(archetypes).reduce((acc, k) => { 
                acc[[...k].sort().join('')] = archetypes[k]; 
                return acc; 
            }, {}); 
            
            return sortedArch[key] || (colors.length >= 4 ? "4-Color" : ""); 
        }


        // --- 5. NAVEGACIÓN Y FLUJO ---
        function updateCount(type, val) { 
            state[type] = Math.max(1, state[type] + val); 
            document.getElementById('count-' + type).innerText = state[type]; 
        }

        function applyDandLPreset() { 
            state.players = 2; 
            state.decks = 7; 
            state.deckData = baseDecks.map(d => ({...d, colors: [...d.colors]})); 
            state.presetPlayers = ["Daniel", "Laura"]; 
            goToDecks(); 
        }

        function switchScreen(screenNum, title) { 
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active')); 
            document.getElementById('screen-' + screenNum).classList.add('active'); 
            document.getElementById('top-title').innerText = title; 
            state.step = screenNum; 
            
            // Control del botón inferior
            document.getElementById('main-action-bar').style.display = screenNum < 4 ? 'block' : 'none'; 
            window.scrollTo(0,0); 
        }

        function goBack() { 
            if(state.step === 2) switchScreen(1, "Configure Match"); 
            if(state.step === 3) switchScreen(2, "Deck Entry"); 
            if(state.step === 4) switchScreen(3, "Who is playing?"); 
        }

        function handleNextStep() { 
            if(state.step === 1) goToDecks(); 
            else if(state.step === 2) goToPlayers(); 
            else if(state.step === 3) executeAssignment(); 
        }


        // --- 6. LÓGICA DE MAZOS (PANTALLA 2) ---
        function buildDeckDOM() {
            const container = document.getElementById('deck-inputs-container'); 
            container.innerHTML = '';
            
            const lib = [...baseDecks, ...state.savedDecks];
            
            state.deckData.forEach((deck, i) => {
                const archName = getColorName(deck.colors);
                
                // Construir HTML de colores de maná
                const colorsHTML = state.manaColors.map(m => `
                    <button onclick="toggleColor(${i},'${m.id}')" class="size-10 rounded-full flex items-center justify-center mana-btn ${m.cls} ${deck.colors.includes(m.id) ? 'active' : 'opacity-30'}">
                        <span class="material-symbols-outlined text-[18px]">${m.icon}</span>
                    </button>
                `).join('');
                
                // Construir la tarjeta del mazo
                container.innerHTML += `
                    <div class="bg-app-surface p-4 rounded-2xl border border-white/5 relative shadow-sm">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] font-bold text-app-accent uppercase">Deck #${i+1}</label>
                            <div class="flex gap-2">
                                <select onchange="loadDeck(${i}, this.value)" class="text-[10px] bg-transparent border-none p-0 w-24 truncate font-bold uppercase cursor-pointer">
                                    <option value="" disabled selected>Library</option>
                                    ${lib.map((ld, idx) => `<option value="${idx}">${ld.name}</option>`).join('')}
                                </select>
                                <button onclick="removeDeck(${i})" class="text-red-400 hover:text-red-300 transition-colors">
                                    <span class="material-symbols-outlined text-[14px]">delete</span>
                                </button>
                            </div>
                        </div>
                        <input type="text" oninput="state.deckData[${i}].name=this.value" class="w-full bg-app-surface-light border-none rounded-xl text-sm mb-3 focus:ring-1 focus:ring-app-primary" value="${deck.name}" placeholder="Deck Name">
                        <div class="flex justify-between items-center">
                            <div class="flex gap-2">${colorsHTML}</div>
                            <span class="text-[10px] font-bold text-app-accent italic">${archName}</span>
                        </div>
                    </div>
                `;
            });
        }

        function loadDeck(deckIndex, libraryIndex) { 
            const deckToLoad = [...baseDecks, ...state.savedDecks][libraryIndex]; 
            state.deckData[deckIndex] = {
                name: deckToLoad.name, 
                colors: [...deckToLoad.colors]
            }; 
            buildDeckDOM(); 
        }

        function toggleColor(deckIndex, manaId) { 
            const deck = state.deckData[deckIndex]; 
            deck.colors = deck.colors.includes(manaId) 
                ? deck.colors.filter(c => c !== manaId) 
                : [...deck.colors, manaId]; 
            buildDeckDOM(); 
        }

        function removeDeck(index) { 
            state.deckData.splice(index, 1); 
            state.decks--; 
            buildDeckDOM(); 
        }
        
        function addExtraDeck() { 
            state.decks++; 
            state.deckData.push({name: '', colors: []}); 
            buildDeckDOM(); 
        }

        function goToDecks() { 
            if(state.deckData.length === 0) {
                state.deckData = Array.from({length: state.decks}, () => ({name: '', colors: []})); 
            }
            buildDeckDOM(); 
            switchScreen(2, "Deck Entry"); 
        }


        // --- 7. LÓGICA DE JUGADORES (PANTALLA 3) ---
        function goToPlayers() {
            const container = document.getElementById('player-inputs-container'); 
            container.innerHTML = '';
            
            // Mostrar roster guardado si existe
            if(state.savedPlayers.length > 0) { 
                document.getElementById('saved-players-section').classList.remove('hidden'); 
                renderSavedPlayers(); 
            }
            
            for(let i=0; i<state.players; i++) {
                const defaultName = state.presetPlayers?.[i] || "";
                container.innerHTML += `
                    <div class="bg-app-surface p-4 rounded-xl border border-white/5 relative">
                        <button onclick="removePlayer(${i})" class="absolute right-3 top-2 text-red-400">
                            <span class="material-symbols-outlined text-[14px]">delete</span>
                        </button>
                        <label class="text-[10px] font-bold text-slate-400 uppercase mb-2 block tracking-widest">Player ${i+1}</label>
                        <div class="relative">
                            <span class="material-symbols-outlined absolute left-3 top-3 text-app-primary">person</span>
                            <input type="text" id="p-in-${i}" class="w-full bg-app-surface-light border-none rounded-xl py-3 pl-10 text-sm focus:ring-1 focus:ring-app-primary" value="${defaultName}" placeholder="Enter name">
                        </div>
                    </div>
                `;
            }
            switchScreen(3, "Who is playing?");
        }

        function renderSavedPlayers() { 
            const container = document.getElementById('saved-players-container');
            container.innerHTML = state.savedPlayers.map((playerName, i) => `
                <div class="relative flex flex-col items-center shrink-0">
                    <button onclick="deleteSavedPlayer(${i})" class="absolute -top-1 -right-1 bg-app-surface text-[10px] size-4 flex items-center justify-center rounded-full border border-white/10 hover:bg-red-500 transition-colors">✕</button>
                    <div onclick="quickAdd('${playerName}')" class="size-12 rounded-full border-2 border-app-primary bg-app-surface-light flex items-center justify-center font-bold text-app-primary cursor-pointer hover:bg-app-primary/20 transition-all">
                        ${playerName[0].toUpperCase()}
                    </div>
                    <span class="text-[10px] truncate w-12 text-center mt-1 text-slate-300">${playerName}</span>
                </div>
            `).join(''); 
        }

        function quickAdd(name) { 
            for(let i=0; i<state.players; i++) { 
                const input = document.getElementById('p-in-' + i); 
                if(input && !input.value) { 
                    input.value = name; 
                    break; 
                } 
            } 
        }

        function deleteSavedPlayer(index) { 
            state.savedPlayers.splice(index, 1); 
            saveData(); 
            renderSavedPlayers(); 
        }
        
        function removePlayer(index) { 
            state.players--; 
            goToPlayers(); 
        }
        
        function addExtraPlayer() { 
            state.players++; 
            goToPlayers(); 
        }


        // --- 8. ASIGNACIÓN, RESULTADOS Y MANTENIMIENTO (PANTALLA 4) ---
        function executeAssignment() {
            // Guardar nuevos mazos en la librería
            state.deckData.forEach(d => {
                if(d.name.trim() !== "" && !baseDecks.find(bd => bd.name.toLowerCase() === d.name.toLowerCase())) {
                    let idx = state.savedDecks.findIndex(sd => sd.name.toLowerCase() === d.name.toLowerCase());
                    if(idx >= 0) {
                        state.savedDecks[idx] = {name: d.name, colors: [...d.colors]};
                    } else {
                        state.savedDecks.push({name: d.name, colors: [...d.colors]});
                    }
                }
            });

            // Guardar jugadores
            state.playerNames = Array.from({length: state.players}, (_, i) => document.getElementById('p-in-' + i).value || 'P' + (i+1));
            state.playerNames.forEach(n => { 
                if(!state.savedPlayers.includes(n) && !n.startsWith('P')) {
                    state.savedPlayers.push(n); 
                }
            });
            
            saveData(); 
            buildResultsDOM();
            switchScreen(4, "Battle Pairings");
        }

        function buildResultsDOM() {
            const pool = [...state.deckData].sort(() => Math.random() - 0.5);
            const container = document.getElementById('assignments-container'); 
            
            container.innerHTML = '';
            state.currentMatch = [];
            
            state.playerNames.forEach((player, i) => {
                const assignedDeck = pool.shift() || {name: 'No deck available', colors: []};
                state.currentMatch.push({player: player, deck: assignedDeck});
                
                // Mapeo de colores a iconos
                const manaIconsHtml = assignedDeck.colors.map(col => {
                    const manaInfo = state.manaColors.find(x => x.id === col);
                    return `
                        <div class="size-4 rounded-full flex items-center justify-center ${manaInfo.cls} active border border-black/30 shadow-sm" title="${manaInfo.id}">
                            <span class="material-symbols-outlined text-[10px]">${manaInfo.icon}</span>
                        </div>
                    `;
                }).join('');

                container.innerHTML += `
                    <div id="res-card-${i}" class="bg-app-surface p-4 rounded-2xl border-l-4 border-app-primary flex justify-between items-center shadow-lg transition-colors">
                        <div class="flex items-center gap-4">
                            <div class="relative">
                                <div class="size-12 rounded-full bg-app-surface-light border border-white/10 flex items-center justify-center font-bold text-lg text-white">
                                    ${player[0].toUpperCase()}
                                </div>
                                <div class="absolute -bottom-1 -right-1 bg-app-primary text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full">P${i+1}</div>
                            </div>
                            <div>
                                <h3 class="font-bold text-[15px]">${player}</h3>
                                <p class="text-slate-500 text-[10px] uppercase tracking-widest">Assigned to</p>
                            </div>
                        </div>
                        <div class="text-right max-w-[45%]">
                            <span class="text-app-accent font-bold text-sm line-clamp-1">${assignedDeck.name}</span>
                            <div class="flex gap-1 justify-end my-1">${manaIconsHtml}</div>
                            <button onclick="setWinner(${i})" class="text-[10px] flex items-center gap-1 bg-white/5 px-2 py-1 rounded text-slate-400 hover:text-yellow-400 transition-colors">
                                <span class="material-symbols-outlined text-[14px]">emoji_events</span> Register Win
                            </button>
                        </div>
                    </div>
                `;
            });

            // Mazos sobrantes
            if(pool.length > 0) { 
                document.getElementById('rem-section').classList.remove('hidden'); 
                const remContainer = document.getElementById('remaining-container');
                
                remContainer.innerHTML = pool.map(deck => {
                    const remManaHtml = deck.colors.map(col => {
                        const mInfo = state.manaColors.find(x => x.id === col);
                        return `
                            <div class="size-3.5 rounded-full flex items-center justify-center ${mInfo.cls} active border border-black/30">
                                <span class="material-symbols-outlined text-[9px]">${mInfo.icon}</span>
                            </div>
                        `;
                    }).join('');
                    
                    return `
                        <div class="p-3 bg-app-surface border border-white/5 rounded-xl flex items-center justify-between opacity-70">
                            <span class="text-[12px] font-medium text-slate-300 truncate mr-2">${deck.name}</span>
                            <div class="flex -space-x-1">${remManaHtml}</div>
                        </div>
                    `;
                }).join(''); 
            }
        }

        function setWinner(idx) {
            const timeString = new Date().toLocaleDateString() + ' ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const matchData = { 
                date: timeString, 
                pairings: state.currentMatch, 
                winner: state.playerNames[idx] 
            };
            
            state.history.unshift(matchData);
            saveData();
            
            // Efecto visual en la tarjeta ganadora
            document.querySelectorAll('[id^="res-card-"]').forEach(el => el.classList.remove('border-yellow-400'));
            document.getElementById('res-card-' + idx).classList.add('border-yellow-400');
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            
            if(state.history.length > 0) {
                document.getElementById('history-section').classList.remove('hidden');
            }
            
            container.innerHTML = state.history.slice(0, 3).map(match => `
                <div class="bg-app-surface p-3 rounded-xl border border-white/5 text-[11px] shadow-inner">
                    <div class="flex justify-between mb-2 text-slate-500 uppercase font-bold tracking-tighter">
                        <span>${match.date}</span>
                        <span class="text-yellow-400">🏆 ${match.winner}</span>
                    </div>
                    ${match.pairings.map(p => `
                        <div class="flex justify-between py-0.5">
                            <span class="text-slate-300">${p.player}</span>
                            <span class="text-app-accent font-medium">${p.deck.name}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        function shareWhatsApp() {
            let messageText = "⚔️ *MTG BATTLE ASSIGNMENT* ⚔️\n\n";
            state.currentMatch.forEach(m => {
                messageText += `👤 *${m.player}* ➔ ${m.deck.name}\n`;
            });
            window.open(`https://wa.me/?text=${encodeURIComponent(messageText)}`);
        }

        function reassignDecks() { 
            buildResultsDOM(); 
        }
        
        function startOver() { 
            state.deckData = []; 
            state.presetPlayers = []; 
            switchScreen(1, "Configure Match"); 
        }
    </script>
</body>
</html>
